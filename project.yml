name: Zen
options:
  bundleIdPrefix: com.lukashammarstrom
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"
targets:
  Zen:
    type: application
    platform: macOS
    sources:
      - path: Zen
    dependencies:
      - package: Sparkle
    settings:
      base:
        INFOPLIST_FILE: Zen/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.lukashammarstrom.zen
        PRODUCT_NAME: Zen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: Zen/Zen.entitlements
